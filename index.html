<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M45,75 L45,95 L30,95 L30,100 L70,100 L70,95 L55,95 L55,75 C75,70 85,50 85,25 L15,25 C15,50 25,70 45,75 Z M20,30 L80,30 C78,50 70,65 50,68 C30,65 22,50 20,30 Z' fill='%235c1f30'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>葡萄日和 - 一杯のワインから、食卓と旅を深くする。</title>
    <meta name="description" content="ワインを、もっと日常の言葉で。葡萄日和は、ワインの知識をむずかしく語るのではなく、食卓、旅、季節の風景とともに楽しむための小さな編集室です。" />

    <!-- Preconnect to Google Fonts (eliminates DNS+TLS round-trips) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load fonts without blocking render -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" />
    </noscript>

    <!-- Preload hero image so it fetches before DOM paint -->
    <link rel="preload" as="image" href="/images/hero_wine.webp" fetchpriority="high" />

    <!-- Inline critical CSS for instant first paint (dark bg + hero text) -->
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      body{background:#121010;color:#f0ebe3;font-family:'Noto Sans JP',sans-serif}
      h1,h2,h3{font-family:'Shippori Mincho',serif;color:#f0ebe3}
      .hero-section{padding:120px 24px 60px;min-height:100vh;display:flex;align-items:center}
      .bento-grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:1200px;margin:0 auto;width:100%}
      .bento-box{background:#1f1b18;border:1px solid rgba(240,235,227,.06);border-radius:28px;padding:32px;overflow:hidden;position:relative}
      .bento-main{min-height:380px;display:flex;flex-direction:column;justify-content:space-between}
      .bento-main h1{font-size:2.4rem;line-height:1.2;letter-spacing:.04em}
      @media(min-width:768px){
        .bento-grid{grid-template-columns:repeat(12,1fr);grid-auto-rows:200px}
        .bento-main{grid-column:span 8;grid-row:span 2;min-height:auto}
        .bento-main h1{font-size:3.6rem}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
